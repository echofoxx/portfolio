<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="t d">
<title id="t">DDC5I Portfolio MVP modular monolith architecture</title><desc id="d">Browser connects to FastAPI modular monolith, PostgreSQL, file storage and Mailpit. Adapter contracts isolate future enterprise integrations.</desc>

<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="t d"><title id="t">DDC5I canonical data model domains</title><desc id="d">Domain-level relational model showing strategy, organization, demand, portfolio, execution, assurance, resources, financial value, and integration governance.</desc>
<defs><style>.b{fill:#fff;stroke:#315a7d;stroke-width:2;rx:12}.h{fill:#0b1f3a}.t{font:18px Arial;fill:#10243e}.w{fill:#fff}.s{font:14px Arial;fill:#35526d}.a{stroke:#6d87a0;stroke-width:2;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="4" orient="auto"><path d="M0 0L9 4L0 8z" fill="#6d87a0"/></marker></defs>

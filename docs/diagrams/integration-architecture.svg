<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="760" viewBox="0 0 1500 760" role="img" aria-labelledby="t d"><title id="t">DDC5I integration architecture</title><desc id="d">Integration hub applies field ownership, event envelopes, retries, lineage, error handling and reconciliation between the local system and external enterprise systems.</desc>
<defs><style>.b{fill:#fff;stroke:#315a7d;stroke-width:2;rx:12}.core{fill:#0b1f3a;stroke:#0b1f3a}.g{fill:#eaf8ef}.a{fill:#fff6df}.t{font:18px Arial;fill:#10243e}.s{font:14px Arial;fill:#35526d}.w{fill:#fff}.ln{stroke:#5e7b97;stroke-width:3;marker-end:url(#m)}.bi{marker-start:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="4" orient="auto"><path d="M0 0L9 4L0 8z" fill="#5e7b97"/></marker></defs>
<rect x="560" y="80" width="380" height="540" class="b core"/><text x="750" y="125" text-anchor="middle" class="t w">DDC5I Portfolio Integration Boundary</text>
<rect x="600" y="160" width="300" height="85" class="b g"/><text x="750" y="193" text-anchor="middle" class="t">Canonical IDs &amp; Lineage</text><text x="750" y="220" text-anchor="middle" class="s">source system · source record · version</text>
<rect x="600" y="275" width="300" height="85" class="b a"/><text x="750" y="308" text-anchor="middle" class="t">Field Ownership Registry</text><text x="750" y="335" text-anchor="middle" class="s">single authority · allowed writers · conflict policy</text>
<rect x="600" y="390" width="300" height="85" class="b g"/><text x="750" y="423" text-anchor="middle" class="t">Business Event Envelope</text><text x="750" y="450" text-anchor="middle" class="s">schema version · correlation · idempotency</text>
<rect x="600" y="505" width="300" height="85" class="b a"/><text x="750" y="538" text-anchor="middle" class="t">Retry &amp; Reconciliation</text><text x="750" y="565" text-anchor="middle" class="s">dead letter · error record · operator review</text>
<rect x="70" y="80" width="310" height="105" class="b"/><text x="225" y="120" text-anchor="middle" class="t">ServiceNow SPM</text><text x="225" y="150" text-anchor="middle" class="s">Demand · investment · portfolio governance</text>
<rect x="70" y="235" width="310" height="105" class="b"/><text x="225" y="275" text-anchor="middle" class="t">ProjectOS</text><text x="225" y="305" text-anchor="middle" class="s">Tasks · schedules · documents · status</text>
<rect x="70" y="390" width="310" height="105" class="b"/><text x="225" y="430" text-anchor="middle" class="t">Microsoft 365 / SharePoint</text><text x="225" y="460" text-anchor="middle" class="s">Notifications · calendar · approvals · records</text>
<rect x="70" y="545" width="310" height="105" class="b"/><text x="225" y="585" text-anchor="middle" class="t">Jira / Azure DevOps</text><text x="225" y="615" text-anchor="middle" class="s">Execution work items under governed contract</text>
<rect x="1120" y="80" width="310" height="105" class="b"/><text x="1275" y="120" text-anchor="middle" class="t">Advana / WDP / Power BI</text><text x="1275" y="150" text-anchor="middle" class="s">Read-optimized analytics data products</text>
<rect x="1120" y="260" width="310" height="105" class="b"/><text x="1275" y="300" text-anchor="middle" class="t">Financial Systems</text><text x="1275" y="330" text-anchor="middle" class="s">Authoritative commitments · actuals · rates</text>
<rect x="1120" y="440" width="310" height="105" class="b"/><text x="1275" y="480" text-anchor="middle" class="t">Workforce / Identity</text><text x="1275" y="510" text-anchor="middle" class="s">Personnel · positions · skills · OIDC/SAML/CAC/PIV</text>
<line x1="380" y1="132" x2="560" y2="190" class="ln bi"/><line x1="380" y1="288" x2="560" y2="305" class="ln bi"/><line x1="380" y1="443" x2="560" y2="430" class="ln bi"/><line x1="380" y1="598" x2="560" y2="545" class="ln bi"/><line x1="940" y1="190" x2="1120" y2="132" class="ln"/><line x1="940" y1="320" x2="1120" y2="312" class="ln bi"/><line x1="940" y1="500" x2="1120" y2="492" class="ln bi"/>
<text x="750" y="700" text-anchor="middle" class="s">No connector may write a governed field until its synchronization contract identifies the authoritative owner and conflict behavior.</text>
</svg>
